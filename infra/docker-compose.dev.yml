name: quanlyvks-dev
# Dev only: chỉ khởi động MariaDB.
# API và Web chạy local bằng pnpm để tận dụng hot-reload.
#
# Lệnh: pnpm db:up / pnpm db:down / pnpm db:logs

services:
  mariadb:
    image: ${MARIADB_IMAGE:-mariadb:11}
    container_name: ${MARIADB_CONTAINER:-quanlyvks-mariadb}
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root-change-me}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-quanlyvks}
      MARIADB_USER: ${MARIADB_USER:-quanlyvks}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-me}
      TZ: Asia/Ho_Chi_Minh
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "${MARIADB_HOST_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/001_init_utf8mb4.sql:/docker-entrypoint-initdb.d/001_init_utf8mb4.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mariadb_data:
