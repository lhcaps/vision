services:
  postgres:
    image: postgres:16-alpine
    container_name: visionflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: visionflow
      POSTGRES_PASSWORD: visionflow
      POSTGRES_DB: visionflow
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U visionflow -d visionflow']
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - visionflow-net

  redis:
    image: redis:7-alpine
    container_name: visionflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - visionflow-net

  minio:
    image: minio/minio:latest
    container_name: visionflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: visionflow
      MINIO_ROOT_PASSWORD: visionflow-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - visionflow-net

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command: |
      "sleep 5 && mc alias set local http://minio:9000 visionflow visionflow-secret && mc mb local/visionflow-artifacts --ignore-existing && mc anonymous set download local/visionflow-artifacts"
    restart: 'no'
    networks:
      - visionflow-net

networks:
  visionflow-net:
    name: visionflow-network
    driver: bridge

volumes:
  postgres-data:
  minio-data:
