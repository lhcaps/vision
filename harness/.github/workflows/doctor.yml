name: harness doctor

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run harness doctor
        run: node cli/harness.mjs doctor
        shell: bash

      - name: Run harness diff
        run: node cli/harness.mjs diff
        shell: bash
